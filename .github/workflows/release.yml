name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Python package
        run: pip install -e '.[dev]'
      - name: Validate Python and SQL Agent contracts
        run: |
          pytest
          ruff check .
          queryassure seed --orders 1000
          queryassure validate-data
          queryassure test --suite evals/retail.yml
      - name: Validate playground
        run: |
          npm ci
          npm test

  python-artifacts:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and verify distributions
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
          (cd dist && sha256sum *.whl *.tar.gz > SHA256SUMS)
      - name: Create release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes_file" ]]; then
            notes_file="CHANGELOG.md"
          fi
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "QueryAssure $GITHUB_REF_NAME" \
              --notes-file "$notes_file"
          fi

  containers:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: queryassure-api
            dockerfile: Dockerfile
          - name: queryassure-playground
            dockerfile: Dockerfile.web
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push versioned container
        env:
          IMAGE: ghcr.io/victoria824/${{ matrix.name }}
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          docker build \
            --file "${{ matrix.dockerfile }}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.version=${version}" \
            --tag "${IMAGE}:${version}" \
            --tag "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${version}"
          docker push "${IMAGE}:latest"
