services:
  agent:
    build: .
    command: dak serve --host 0.0.0.0
    ports:
      - "8000:8000"
    environment:
      DATAAGENTKIT_DATABASE: /app/data/retail.duckdb
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    depends_on:
      agent:
        condition: service_healthy
