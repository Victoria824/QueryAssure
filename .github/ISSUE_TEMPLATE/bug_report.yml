name: Bug report
description: Report a reproducible QueryAssure failure
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: Thanks for helping make SQL Agents safer to ship. Please remove secrets and production data from traces.
  - type: input
    id: version
    attributes:
      label: QueryAssure version
      placeholder: v0.3.1 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - SQL validation
        - Metadata grounding
        - Evaluation runner
        - Reference SQL Agent
        - Playground
        - Database or agent adapter
        - Docker or CI
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the command, sanitized schema or fixture, and smallest failing test case.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized trace
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data-safety check
      options:
        - label: I removed credentials, personal information, and proprietary production data.
          required: true
