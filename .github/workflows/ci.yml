name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Python package
        run: pip install -e '.[dev]'
      - name: Run Python tests
        run: pytest
      - name: Run DataAgentKit golden suite
        run: |
          dak seed --orders 1000
          dak validate-data
          dak test --suite evals/retail.yml
          dak benchmark --report reference=reports/latest.json
      - name: Install web dependencies
        run: npm ci
      - name: Build playground
        run: npm run build
      - name: Upload benchmark
        uses: actions/upload-artifact@v4
        with:
          name: northstar-benchmark
          path: benchmarks/

  dogfood-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run DataAgentKit as a reusable action
        uses: ./
        with:
          suite: evals/retail.yml
          report: reports/action.json
