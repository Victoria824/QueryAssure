name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install Python package
        run: pip install -e '.[dev]'
      - name: Run Python tests
        run: pytest
      - name: Run QueryAssure golden suite
        run: |
          queryassure seed --orders 1000
          queryassure validate-data
          queryassure test --suite evals/retail.yml
          queryassure benchmark --report reference=reports/latest.json
      - name: Install web dependencies
        run: npm ci
      - name: Build playground
        run: npm run build
      - name: Upload benchmark
        uses: actions/upload-artifact@v4
        with:
          name: northstar-benchmark
          path: benchmarks/

  dogfood-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run QueryAssure as a reusable action
        uses: ./
        with:
          suite: evals/retail.yml
          report: reports/action.json

  docker-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build the complete stack
        run: docker compose build
      - name: Start containers
        run: docker compose up -d
      - name: Wait for API health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color
          exit 1
      - name: Wait for the playground
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000/ > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --no-color
          exit 1
      - name: Verify the agent schema endpoint
        run: curl --fail --silent http://localhost:8000/api/schema > /dev/null
      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Stop containers
        if: always()
        run: docker compose down --volumes
